name: tremble
description: Tremble – Passive proximity-based dating app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Routing
  flutter_riverpod: ^2.4.9
  lucide_icons: 0.257.0
  google_fonts: ^8.0.2
  glassmorphism: ^3.0.0
  go_router: ^17.1.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_svg: ^2.0.10
  riverpod_annotation: ^2.3.4

  # Background & Notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.0.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  firebase_app_check: ^0.4.1+5
  dart_geohash: ^2.1.0
  firebase_crashlytics: ^5.0.8
  uuid: ^4.4.0
  crypto: ^3.0.3
  cloud_functions: ^6.0.7
  http: ^1.2.2

  # BLE + Location
  flutter_blue_plus: ^2.2.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  battery_plus: ^7.0.0
  shared_preferences: ^2.5.4
  google_sign_in: ^6.2.0
  google_maps_flutter: ^2.15.0
  flutter_animate: ^4.5.2
  flutter_ble_peripheral: ^2.1.0
  vibration: ^3.1.8
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.11
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - Logo/
