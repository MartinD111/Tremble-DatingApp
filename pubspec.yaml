name: tremble
description: Tremble – Passive proximity-based dating app.
publish_to: 'none'
version: 1.0.0+26

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sentry_flutter: ^8.3.0

  # UI & Routing
  flutter_riverpod: ^2.4.9
  lucide_icons_flutter: ^3.1.14+1
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_svg: ^2.0.10
  riverpod_annotation: ^2.3.4

  # Background & Notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.0.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  firebase_app_check: ^0.4.1+5
  dart_geohash: ^2.1.0
  firebase_crashlytics: ^5.0.8
  uuid: ^4.4.0
  crypto: ^3.0.3
  cloud_functions: ^6.0.7
  http: ^1.2.2
  cupertino_http: ^2.0.0

  # BLE + Location
  flutter_blue_plus: ^2.2.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  battery_plus: ^7.0.0
  shared_preferences: ^2.5.4
  google_sign_in: ^6.2.0
  flutter_map: ^7.0.0
  vector_map_tiles: ^8.0.0
  vector_map_tiles_pmtiles: ^1.5.0
  latlong2: ^0.9.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_ble_peripheral: ^2.1.0
  vibration: ^3.1.8
  share_plus: ^10.1.4
  flutter_contacts: ^2.0.2

  # Screen protection
  screen_protector: ^1.3.2
  sign_in_with_apple: ^6.1.4
  purchases_flutter: ^10.2.0
  purchases_ui_flutter: ^10.2.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.0
  flutter_image_compress: ^2.4.0
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.11
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  sentry_dart_plugin: ^3.4.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - Logo/
    - assets/map/tremble_dark_style.json
    # Brand typefaces, bundled so first launch never depends on the network.
    # google_fonts matches an asset whose filename ends with its API prefix
    # ("<Family>-<Variant>"), so these are picked up without a `fonts:` block
    # and every GoogleFonts.* call site keeps working unchanged.
    # Regenerate with tool/fetch_fonts.py — do not hand-rename these files.
    - assets/fonts/

# ── Sentry debug-symbol upload (sentry_dart_plugin) ─────────────────────────
# Releases ship --obfuscate --split-debug-info, so without these uploads every
# production frame arrives as `<redacted>` and every Dart issue title as `lM:`.
# Run via scripts/release/build_prod.sh — never by hand.
#
# project: events land in `tremble-functions`, NOT `tremble-app`. The DSN in
# .env.prod.json resolves to project id 4511554698936400, and the live iOS
# crashes (TREMBLE-FUNCTIONS-Q/-S, platform cocoa, release
# tremble.dating.app@1.0.0+23) are in that project. `tremble-app` exists but
# receives nothing — uploading there symbolicates nothing.
#
# url: deliberately NOT set. The org is EU-region, but an org auth token
# (sntrys_…) embeds its own url + region_url, and sentry-cli uses the embedded
# value — a manual `url:` is ignored and emits "Using https://sentry.io
# (embedded in token) rather than manually-configured URL". Only set this if we
# ever switch to a personal token, which carries no region.
#
# auth_token is deliberately absent: this file is committed and
# scripts/ci/secret_scan.sh runs pre-commit. Supply SENTRY_AUTH_TOKEN instead.
#
# symbols_path and dart_symbol_map_path are deliberately NOT set here. They are
# passed per-platform by the release script via --sentry-define, because the
# plugin's dart-symbol-map collector always searches build/ios for iOS dSYMs and
# returns the UNION of Android + iOS debug files
# (dart_symbol_map_debug_files_collector.dart:101,113). A single map would then
# be paired with both platforms' debug IDs — but iOS and Android obfuscate in
# separate gen_snapshot runs, so their maps differ. Scoping symbols_path per
# platform is what keeps each map paired only with its own build.
sentry:
  org: aleksandar-bojic
  project: tremble-functions
  upload_debug_symbols: true
  upload_sources: false
  # commits: false disables release-commit association (suspect-commits). It
  # needs a Sentry<->GitHub integration AND linear git history; this repo
  # squash-merges, so the previous release's commit SHA vanishes and the plugin
  # aborts with "Could not find the SHA of the previous release" — which killed
  # the build 25 run AFTER symbols had already uploaded. Symbolication does not
  # need commit association, so switch it off rather than paper over it with
  # ignore_missing.
  commits: false
  log_level: info
