name: tremble
description: Tremble – Passive proximity-based dating app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Routing
  flutter_riverpod: ^2.4.9
  lucide_icons: 0.257.0
  google_fonts: ^6.1.0
  glassmorphism: ^3.0.0
  go_router: ^17.1.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Background & Notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.1.3
  dart_geohash: ^2.1.0
  firebase_crashlytics: ^4.1.3
  uuid: ^4.4.0
  crypto: ^3.0.3
  cloud_functions: ^5.1.3
  http: ^1.2.2

  # BLE + Location
  flutter_blue_plus: ^1.32.12
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
