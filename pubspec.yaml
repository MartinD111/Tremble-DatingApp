name: tremble
description: Tremble – Passive proximity-based dating app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sentry_flutter: ^8.3.0

  # UI & Routing
  flutter_riverpod: ^2.4.9
  lucide_icons_flutter: ^3.1.14+1
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_svg: ^2.0.10
  riverpod_annotation: ^2.3.4

  # Background & Notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.0.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  firebase_app_check: ^0.4.1+5
  dart_geohash: ^2.1.0
  firebase_crashlytics: ^5.0.8
  uuid: ^4.4.0
  crypto: ^3.0.3
  cloud_functions: ^6.0.7
  http: ^1.2.2
  cupertino_http: ^2.0.0

  # BLE + Location
  flutter_blue_plus: ^2.2.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  battery_plus: ^7.0.0
  shared_preferences: ^2.5.4
  google_sign_in: ^6.2.0
  flutter_map: ^7.0.0
  vector_map_tiles: ^8.0.0
  vector_map_tiles_pmtiles: ^1.5.0
  latlong2: ^0.9.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_ble_peripheral: ^2.1.0
  vibration: ^3.1.8
  share_plus: ^10.1.4
  flutter_contacts: ^2.0.2

  # Screen protection
  screen_protector: ^1.3.2
  sign_in_with_apple: ^6.1.4
  purchases_flutter: ^10.2.0
  purchases_ui_flutter: ^10.2.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.11
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - Logo/
    - assets/map/tremble_dark_style.json
