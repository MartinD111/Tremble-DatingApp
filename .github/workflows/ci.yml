name: CI — Lint, Test, Build & MPC Policy Enforcement

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PLAN_FILE: "tasks/plan.md"
  CONTEXT_FILE: "tasks/context.md"
  QUALITY_SCORE_THRESHOLD: "85"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── ① MPC: PR Metadata Validation ──────────────────────────────────────
  # Only runs on pull_request events, skipped on direct pushes.
  mpc-validate-pr:
    name: "① MPC — PR Metadata"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      is_high_risk: ${{ steps.risk_eval.outputs.is_high_risk }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR metadata
        id: pr_meta
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('title', pr.data.title);
            core.setOutput('body', pr.data.body || '');

      - name: Check Plan-ID in title
        run: |
          TITLE="${{ steps.pr_meta.outputs.title }}"
          echo "PR Title: $TITLE"
          if ! echo "$TITLE" | grep -E "\[PLAN-ID: ?[0-9]{8}-[a-z0-9\-]+\]"; then
            echo "❌ Missing Plan-ID in PR title."
            echo "   Required format: [PLAN-ID: YYYYMMDD-short-name]"
            echo "   Plan-ID must exist in tasks/plan.md."
            exit 1
          fi
          echo "✅ Plan-ID present."

      - name: Check verification checklist in body
        run: |
          BODY="${{ steps.pr_meta.outputs.body }}"
          FAILED=0
          for phrase in "Verification checklist" "unit tests" "integration tests" "security scan"; do
            if ! echo "$BODY" | grep -qi "$phrase"; then
              echo "❌ PR body missing required phrase: '$phrase'"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq "0" ] && echo "✅ Verification checklist present." || exit 1

      - name: Check ADR reference for architecture changes
        run: |
          BODY="${{ steps.pr_meta.outputs.body }}"
          BASE="${{ github.base_ref }}"
          [ -z "$BASE" ] && BASE="HEAD~1" || BASE="origin/$BASE"
          CHANGED=$(git diff --name-only $BASE...HEAD \
            | grep -E "(system_map|infra|firebase\.json|pubspec\.yaml)" || true)
          if [ -n "$CHANGED" ]; then
            if ! echo "$BODY" | grep -qE "ADR-[0-9]+"; then
              echo "❌ Architecture-affecting PR must reference an ADR (e.g. ADR-001)."
              exit 1
            fi
            echo "✅ ADR reference found."
          else
            echo "ℹ️  No architecture files changed — ADR check skipped."
          fi

      - name: Evaluate risk level
        id: risk_eval
        run: |
          BODY="${{ steps.pr_meta.outputs.body }}"
          if echo "$BODY" | grep -iE "(infra_change|touches_auth|touches_pii|external_model_calls|risk_level: (high|critical))"; then
            echo "is_high_risk=true" >> $GITHUB_OUTPUT
            echo "⚠️  HIGH RISK PR — founder approval gate will be required."
          else
            echo "is_high_risk=false" >> $GITHUB_OUTPUT
          fi

      - name: Check context.md is not stale
        run: |
          if [ -f "${{ env.CONTEXT_FILE }}" ]; then
            LAST_MODIFIED=$(stat -c %Y "${{ env.CONTEXT_FILE }}")
            NOW=$(date +%s)
            AGE_HOURS=$(( (NOW - LAST_MODIFIED) / 3600 ))
            echo "context.md age: ${AGE_HOURS}h"
            if [ "$AGE_HOURS" -gt "48" ]; then
              echo "⚠️  WARNING: context.md is older than 48h. Re-validate session state before merging."
            else
              echo "✅ context.md is current."
            fi
          else
            echo "❌ tasks/context.md missing. Run MPC Workflow initialization first."
            exit 1
          fi

  # ── ② MPC: Policy Enforcement ──────────────────────────────────────────
  mpc-policy:
    name: "② MPC — Policy Enforcement"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [mpc-validate-pr]
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (SEC-001)
        run: |
          if [ -f scripts/ci/secret_scan.sh ]; then
            bash scripts/ci/secret_scan.sh || { echo "❌ Secret scan failed."; exit 1; }
          else
            echo "ℹ️  scripts/ci/secret_scan.sh not yet implemented — skipping."
            echo "    Add this script to enforce SEC-001 automatically."
          fi

      - name: Dependency vulnerability scan (SEC-002)
        run: |
          if [ -f scripts/ci/dependency_scan.sh ]; then
            bash scripts/ci/dependency_scan.sh || { echo "❌ Dependency scan failed."; exit 1; }
          else
            echo "ℹ️  scripts/ci/dependency_scan.sh not yet implemented — skipping."
          fi

      - name: License scan (SEC-003)
        run: |
          if [ -f scripts/ci/license_scan.sh ]; then
            bash scripts/ci/license_scan.sh || { echo "❌ License scan failed."; exit 1; }
          else
            echo "ℹ️  scripts/ci/license_scan.sh not yet implemented — skipping."
          fi

      - name: Policy engine (all YAML rules)
        run: |
          if [ -f scripts/ci/policy_engine.py ]; then
            python3 scripts/ci/policy_engine.py --policies "${{ env.POLICY_DIR }}" \
              || { echo "❌ Policy violations detected."; exit 1; }
          else
            echo "ℹ️  scripts/ci/policy_engine.py not yet implemented — skipping."
          fi

  # ── ③ Flutter Frontend ──────────────────────────────────────────────────
  flutter:
    name: "③ Flutter — Analyze & Test"
    runs-on: ubuntu-latest
    needs: [mpc-policy]
    # On push events mpc-policy is skipped, so use 'always()' guard
    if: always() && (needs.mpc-policy.result == 'success' || needs.mpc-policy.result == 'skipped')
    steps:
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Setup Firebase options
        env:
          FIREBASE_OPTIONS_DEV_BASE64: ${{ secrets.FIREBASE_OPTIONS_DEV_BASE64 }}
          FIREBASE_OPTIONS_PROD_BASE64: ${{ secrets.FIREBASE_OPTIONS_PROD_BASE64 }}
        run: bash scripts/ci/setup_firebase_options.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info

  # ── ④ Cloud Functions Backend ───────────────────────────────────────────
  backend:
    name: "④ Backend — Lint & Build"
    runs-on: ubuntu-latest
    needs: [mpc-policy]
    if: always() && (needs.mpc-policy.result == 'success' || needs.mpc-policy.result == 'skipped')
    defaults:
      run:
        working-directory: functions
    steps:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (type check)
        run: npm run build

      - name: Run tests
        run: npm test -- --passWithNoTests

  # ── ⑤ MPC: Security Scans ──────────────────────────────────────────────
  mpc-security:
    name: "⑤ MPC — Security Scans"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [flutter, backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SAST scan
        run: |
          if [ -f scripts/ci/sast_scan.sh ]; then
            bash scripts/ci/sast_scan.sh || { echo "❌ SAST failed."; exit 1; }
          else
            echo "ℹ️  scripts/ci/sast_scan.sh not yet implemented — skipping."
          fi

      - name: AI safety check (SEC-008)
        run: |
          BASE="${{ github.base_ref }}"
          [ -z "$BASE" ] && BASE="HEAD~1" || BASE="origin/$BASE"
          CHANGED=$(git diff --name-only $BASE...HEAD || true)
          if [ -n "$CHANGED" ] && git diff $BASE...HEAD -- $CHANGED \
              | grep -qE "(openai\.|anthropic\.|model_call\()"; then
            echo "🤖 AI feature change detected — running AI safety check..."
            if [ -f scripts/ci/ai_safety_check.sh ]; then
              bash scripts/ci/ai_safety_check.sh || { echo "❌ AI safety check failed."; exit 1; }
            else
              echo "⚠️  AI feature change detected but scripts/ci/ai_safety_check.sh not yet implemented."
              echo "    Implement this before shipping AI features to production."
            fi
          else
            echo "ℹ️  No AI feature changes — AI safety check skipped."
          fi

  # ── ⑥ MPC: SRE Gate ────────────────────────────────────────────────────
  mpc-sre-gate:
    name: "⑥ MPC — SRE Gate"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [mpc-security]
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate SLO impact
        run: |
          if [ -f scripts/ci/slo_evaluator.sh ]; then
            bash scripts/ci/slo_evaluator.sh || { echo "❌ SRE gate failed."; exit 1; }
          else
            echo "ℹ️  scripts/ci/slo_evaluator.sh not yet implemented — skipping."
          fi
          echo "✅ SRE gate passed."

  # ── ⑦ MPC: Founder Approval (High Risk only) ───────────────────────────
  mpc-founder-approval:
    name: "⑦ MPC — Founder Approval"
    runs-on: ubuntu-latest
    needs: [mpc-sre-gate, mpc-validate-pr]
    if: |
      github.event_name == 'pull_request' &&
      needs.mpc-validate-pr.outputs.is_high_risk == 'true'
    environment:
      name: "founder-approval"
      # Set this up in GitHub → Settings → Environments
      # Add yourself as a required reviewer.
      # High-risk PRs (infra, auth, PII, AI) will pause here for your approval.
    steps:
      - name: Awaiting founder approval
        run: |
          echo "⏸  HIGH RISK PR paused for founder approval."
          echo "   Approve at: GitHub → Environments → founder-approval"

  # ── ⑧ Final Gate ───────────────────────────────────────────────────────
  all-checks-passed:
    name: "⑧ All Checks Passed"
    runs-on: ubuntu-latest
    if: always()
    needs: [flutter, backend, mpc-sre-gate, mpc-founder-approval]
    steps:
      - name: Evaluate all job results
        run: |
          FLUTTER="${{ needs.flutter.result }}"
          BACKEND="${{ needs.backend.result }}"
          SRE="${{ needs.mpc-sre-gate.result }}"
          FOUNDER="${{ needs.mpc-founder-approval.result }}"

          echo "Flutter:          $FLUTTER"
          echo "Backend:          $BACKEND"
          echo "SRE Gate:         $SRE"
          echo "Founder Approval: $FOUNDER"

          # Flutter and backend must always pass
          if [ "$FLUTTER" != "success" ] || [ "$BACKEND" != "success" ]; then
            echo "❌ Flutter or backend checks failed."
            exit 1
          fi

          # SRE gate must pass or be skipped (push events)
          if [ "$SRE" != "success" ] && [ "$SRE" != "skipped" ]; then
            echo "❌ SRE gate failed."
            exit 1
          fi

          # Founder approval must pass or be skipped (low-risk PRs)
          if [ "$FOUNDER" != "success" ] && [ "$FOUNDER" != "skipped" ]; then
            echo "❌ Founder approval required but not granted."
            exit 1
          fi

          echo ""
          echo "=================================================="
          echo "✅ All MPC Workflow gates passed."
          echo "   PR is eligible for merge."
          echo ""
          echo "Before merging, confirm:"
          echo "  [ ] context.md session handoff block written"
          echo "  [ ] lessons.md updated if new rule was learned"
          echo "  [ ] debt.md updated if any shortcut was taken"
          echo "=================================================="

# ---------------------------------------------------------------------------
# IMPLEMENTATION NOTES
# ---------------------------------------------------------------------------
# Scripts under scripts/ci/ are stubbed with graceful skips until implemented.
# Implement them incrementally — the pipeline won't break while they're missing.
#
# Priority order for implementation:
#   1. scripts/ci/secret_scan.sh       — use truffleHog or gitleaks
#   2. scripts/ci/sast_scan.sh         — use semgrep (free, Flutter + TS rules available)
#   3. scripts/ci/dependency_scan.sh   — npm audit (already have Node) + flutter pub audit
#   4. scripts/ci/license_scan.sh      — use license-checker (npm) + dart pub deps
#   5. scripts/ci/slo_evaluator.sh     — implement after observability is wired up
#   6. scripts/ci/ai_safety_check.sh   — implement before any LLM feature ships
#   7. scripts/ci/policy_engine.py     — implement after all other scripts exist