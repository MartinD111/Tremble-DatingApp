name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  # ── Deploy Cloud Functions ──────────────────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore:rules,firestore:indexes
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ── Build Flutter APK ───────────────────────────────────────────────────
  build-apk:
    name: Build Android APK (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Setup Firebase options
        env:
          FIREBASE_OPTIONS_DEV_BASE64: ${{ secrets.FIREBASE_OPTIONS_DEV_BASE64 }}
          FIREBASE_OPTIONS_PROD_BASE64: ${{ secrets.FIREBASE_OPTIONS_PROD_BASE64 }}
        run: bash scripts/ci/setup_firebase_options.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          FLAVOR="${{ github.event.inputs.environment == 'production' && 'prod' || 'dev' }}"
          flutter build apk --release --dart-define=FLAVOR=$FLAVOR

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tremble-${{ github.event.inputs.environment }}-apk
          path: build/app/outputs/flutter-apk/app-release.apk
