# MASTER PROJECT CONTROLLER (MPC Workflow) — CI/CD Pipeline
name: MPC Workflow CI Pipeline (Tremble Mobile)
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: mpc-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-validate:
    name: "Flutter Code Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Firebase options
        env:
          FIREBASE_OPTIONS_DEV_BASE64: ${{ secrets.FIREBASE_OPTIONS_DEV_BASE64 }}
          FIREBASE_OPTIONS_PROD_BASE64: ${{ secrets.FIREBASE_OPTIONS_PROD_BASE64 }}
        run: |
          bash scripts/ci/setup_firebase_options.sh
          dart format lib/src/core/firebase_options_dev.dart || true
          dart format lib/src/core/firebase_options_prod.dart || true

      - name: Setup Maps API key
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: bash scripts/ci/setup_maps_key.sh

      - name: Install Dependencies
        run: flutter pub get

      - name: Format
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      - name: Run Tests (Dev Flavor)
        run: flutter test --dart-define=FLAVOR=dev

  firebase-security:
    name: "Firebase Rules & Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      - name: Emulate & Test Rules
        run: echo "firebase emulators:exec 'npm test'" # Placeholder for rules tests

  build-dev-android:
    name: "Build Dev APK"
    needs: [flutter-validate, firebase-security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build apk --flavor dev --dart-define=FLAVOR=dev

  quality-gate:
    name: "Quality Gate (MPC Enforce)"
    runs-on: ubuntu-latest
    needs: [build-dev-android]
    steps:
      - run: echo "All mobile gates passed successfully."
