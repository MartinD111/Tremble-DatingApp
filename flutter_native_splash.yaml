flutter_native_splash:
  color: "#1A1A18"
  # Padded brand icon matching the home-screen launcher: rose rounded square
  # with the heart inset ~61% (transparent corners, no white plate) centred on
  # the dark graphite splash. Generated to mirror ic_launcher_foreground.xml.
  image: "Logo/tremble_splash_icon_padded.png"
  android: true
  # iOS assets NOT regenerated yet (iOS gated on B005). Re-run
  # `dart run flutter_native_splash:create` with this true to refresh the iOS
  # LaunchScreen storyboard to the transparent logo when iOS work resumes.
  ios: true
  fullscreen: true
  android_12:
    color: "#1A1A18"
    image: "Logo/tremble_splash_icon_padded.png"
    icon_background_color: "#1A1A18"
